x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://agenticforge:agenticforge@postgres:5432/agenticforge

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agenticforge
      POSTGRES_PASSWORD: agenticforge
      POSTGRES_DB: agenticforge
    ports:
      - "5432:5432"
    volumes:
      - agenticforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenticforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker-compose/migrate.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://agenticforge:agenticforge@postgres:5432/agenticforge
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "-c", "migrations/alembic.ini", "upgrade", "head"]

  orchestrator-api:
    build:
      context: ../..
      dockerfile: services/orchestrator-api/Dockerfile
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  mcp-server:
    build:
      context: ../..
      dockerfile: services/mcp-server/Dockerfile
    environment:
      <<: *app-env
      MCP_SERVER_PORT: "8100"
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  agenticforge_postgres_data:
